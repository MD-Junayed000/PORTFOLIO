services:
  - type: web
    name: portfolio-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Migrations are run by the FastAPI lifespan (see backend/main.py), so we
    # do not declare a preDeployCommand. Render-managed Postgres (Neon) is
    # external to Render, so tables are not auto-created.
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    # NOTE: The FastAPI lifespan (see backend/main.py) auto-loads the local
    # knowledge-base PDF (settings.PDF_PATH) into the in-process RAG pipeline
    # every time the service boots — so re-deployments always start with a
    # warm, fresh knowledge base. No external vector store is required.
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: HF_MODEL_ID
        value: mistralai/Mistral-7B-Instruct-v0.3
      - key: HF_EMBEDDING_MODEL_ID
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: EMBEDDING_DIM
        value: "384"
      - key: CORS_ORIGINS
        sync: false
      # Neon PostgreSQL pooled connection string.
      # Set the value in the Render dashboard so it is not committed to git.
      - key: DATABASE_URL
        sync: false
      # Cloudinary storage
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
